<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理 - caijing18</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <!-- 登录弹窗 -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h2>🔐 管理员登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" value="admin" placeholder="admin">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()">
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="doLogin()" id="loginBtn">登录</button>
                <button class="btn btn-outline" onclick="window.location.href='/'">返回主页</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="header-inner">
            <h1>⚙️ 系统管理</h1>
            <div>
                <span id="headerUser" style="font-size:13px;color:rgba(255,255,255,0.7);margin-right:12px;"></span>
                <a href="javascript:void(0)" onclick="doLogout()" class="nav-link" id="logoutLink" style="display:none;">退出登录</a>
                <a href="/" class="nav-link" style="margin-left:12px;">← 返回主页</a>
            </div>
        </div>
    </div>

    <div class="container" id="mainContent" style="display:none;">
        <!-- Tab 导航 -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('overview', this)">📊 概览</div>
            <div class="tab" onclick="switchTab('channels', this)">📡 频道管理</div>
            <div class="tab" onclick="switchTab('ai', this)">🤖 AI 总结</div>
            <div class="tab" onclick="switchTab('settings', this)">⚙️ 设置</div>
        </div>

        <!-- 概览 Tab -->
        <div class="tab-content active" id="tab-overview">
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-value" id="totalNews">-</div><div class="stat-label">📰 新闻总数</div></div>
                <div class="stat-item green"><div class="stat-value" id="todayNews">-</div><div class="stat-label">📅 今日新增</div></div>
                <div class="stat-item orange"><div class="stat-value" id="totalTags">-</div><div class="stat-label">🏷️ 标签数</div></div>
                <div class="stat-item"><div class="stat-value" id="totalSources">-</div><div class="stat-label">📡 频道数</div></div>
            </div>

            <div class="card">
                <h2>🔧 系统配置</h2>
                <div id="configStatus"><div class="loading">加载中...</div></div>
            </div>

            <div class="card">
                <h2>🏷️ 标签列表</h2>
                <div id="tagManagement"><div class="loading">加载中...</div></div>
            </div>

            <div class="card">
                <h2>📡 订阅频道</h2>
                <div id="overviewChannels"><div class="loading">加载中...</div></div>
            </div>

            <div class="card">
                <h2>⚡ 手动操作</h2>
                <div class="action-row">
                    <button class="btn btn-primary" onclick="manualScrape()" id="scrapeBtn">🔍 手动抓取 Telegram</button>
                    <button class="btn btn-warning" onclick="manualCleanup()" id="cleanupBtn">🧹 清理旧数据</button>
                </div>
                <div id="operationLog" class="log-box" style="margin-top:15px;display:none;"></div>
            </div>
        </div>

        <!-- 频道管理 Tab -->
        <div class="tab-content" id="tab-channels">
            <div class="card">
                <h2>📡 订阅的 Telegram 频道</h2>
                <div style="display:flex;gap:8px;margin-bottom:12px;">
                    <input type="text" class="input-text" id="channelUrl" placeholder="https://t.me/s/频道名称" style="flex:1;">
                    <button class="btn btn-success" onclick="addChannel()">➕ 添加频道</button>
                </div>
                <div id="channelList"><div class="loading">加载中...</div></div>
            </div>
        </div>

        <!-- AI 总结 Tab -->
        <div class="tab-content" id="tab-ai">
            <div class="card">
                <h2>🤖 AI 总结预览</h2>
                <div class="range-tabs">
                    <button class="range-tab active" onclick="switchRange('1d', this)">📅 今日</button>
                    <button class="range-tab" onclick="switchRange('3d', this)">📅 近3天</button>
                    <button class="range-tab" onclick="switchRange('1w', this)">📅 近1周</button>
                    <button class="btn btn-success btn-sm" onclick="manualRefresh()" id="refreshSumBtn" style="margin-left:auto;">🔄 刷新</button>
                </div>
                <div id="aiSummaryPreview"><div class="loading">选择时间范围查看总结...</div></div>
            </div>
        </div>

        <!-- 设置 Tab -->
        <div class="tab-content" id="tab-settings">
            <div class="card">
                <h2>⚙️ 抓取设置</h2>
                <div id="scrapeSettings"><div class="loading">⏳ 加载中...</div></div>
            </div>
            <div class="card">
                <h2>🤖 AI API 设置</h2>
                <div id="aiSettings"><div class="loading">⏳ 加载中...</div></div>
            </div>
            <div class="card">
                <h2>🔑 修改密码</h2>
                <div style="max-width:350px;">
                    <div class="form-group">
                        <label style="font-size:13px;color:#666;">原密码</label>
                        <input type="password" class="input-text" id="oldPassword" placeholder="输入原密码">
                    </div>
                    <div class="form-group" style="margin-top:10px;">
                        <label style="font-size:13px;color:#666;">新密码</label>
                        <input type="password" class="input-text" id="newPassword" placeholder="输入新密码（至少4位）">
                    </div>
                    <button class="btn btn-warning" onclick="changePwd()" style="margin-top:10px;" id="changePwdBtn">修改密码</button>
                </div>
            </div>
        </div>

        <!-- 日志窗口 -->
        <div class="card" style="display:none;" id="logCard">
            <h2>📋 操作日志</h2>
            <div id="logBox" class="log-box"></div>
        </div>

        <!-- 间隔设置弹窗 -->
        <div class="modal-overlay" id="intervalModal">
            <div class="modal">
                <h2>⚙️ 修改抓取间隔</h2>
                <div class="form-group">
                    <label>间隔（分钟）</label>
                    <input type="number" class="input-text" id="intervalInput" min="1" max="1440" placeholder="输入分钟数">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-primary" onclick="saveInterval()">💾 保存</button>
                    <button class="btn btn-outline" onclick="closeModal('intervalModal')">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
