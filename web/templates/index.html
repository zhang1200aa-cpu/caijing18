<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">📈 财经新闻聚合</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <h1 id="siteTitle">📈 <span id="siteNameDisplay">财经新闻聚合</span></h1>
            <div class="stats">
                共 <span id="totalCount">0</span> 条新闻 |
                今日 <span id="todayCount">0</span> 条 |
                <a href="/admin" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px;">⚙️ 管理</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索新闻标题、内容、标签..." />
            <button onclick="searchNews()">🔍 搜索</button>
            <button class="secondary" onclick="resetSearch()">↺ 重置</button>
            <button class="summary" onclick="window.location.href='/summary'">🤖 总结中心</button>
        </div>

        <div class="filter-section">
            <h3>🏷️ 标签筛选</h3>
            <div class="tag-filter" id="tagFilter"></div>
        </div>

        <div id="newsList" class="news-list"></div>
        <div id="pagination" class="pagination"></div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
