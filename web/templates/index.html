<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 财经新闻聚合</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <h1>📈 财经新闻聚合</h1>
            <div class="stats">
                共 <span id="totalCount">0</span> 条新闻 |
                今日 <span id="todayCount">0</span> 条 |
                <a href="/admin" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px;">⚙️ 管理</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索新闻标题、内容、标签..." />
            <button onclick="searchNews()">🔍 搜索</button>
            <button class="secondary" onclick="resetSearch()">↺ 重置</button>
            <button class="summary" onclick="window.open('/summary/1d', '_blank')">🤖 每日总结</button>
            <button class="summary-3d" onclick="window.open('/summary/3d', '_blank')">🤖 三日总结</button>
            <button class="summary-1w" onclick="window.open('/summary/1w', '_blank')">🤖 一周总结</button>
        </div>

        <div class="ai-summary-section" id="aiSummarySection" style="display:none;">
            <div class="ai-summary-header">
                <h2>🤖 AI 财经总结 <span class="ai-badge">AI</span></h2>
                <div class="ai-actions">
                    <button onclick="window.open('/summary/1d', '_blank')" style="padding:6px 14px; background:white; border:1px solid #27ae60; color:#27ae60; border-radius:6px; cursor:pointer;">📄 详情</button>
                    <button onclick="loadAISummary()" style="padding:6px 14px; background:white; border:1px solid #666; color:#666; border-radius:6px; cursor:pointer;">🔄 刷新</button>
                </div>
            </div>
            <div class="ai-summary-content" id="aiSummaryContent"></div>
            <div class="ai-summary-meta" id="aiSummaryMeta"></div>
        </div>

        <div class="filter-section">
            <h3>🏷️ 标签筛选</h3>
            <div class="tag-filter" id="tagFilter"></div>
        </div>

        <div id="newsList" class="news-list"></div>
        <div id="pagination" class="pagination"></div>
    </div>

    <div id="analysisModal" class="analysis-modal">
        <div class="analysis-modal-content">
            <h3>📊 AI 新闻解读</h3>
            <div id="analysisText" class="analysis-text">⏳ AI 分析中...</div>
            <button class="close-btn" onclick="closeAnalysisModal()">关闭</button>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
