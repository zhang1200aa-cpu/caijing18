<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">📈 财经新闻聚合</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <h1 id="siteTitle">
                <span class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 17L8 12L12 15L17 8L21 12" stroke="#64b5f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <animate attributeName="stroke-dasharray" from="0 100" to="100 0" dur="1.5s" fill="freeze"/>
                        </path>
                        <path d="M3 17L8 12L12 15L17 8L21 12" stroke="#90caf9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" stroke-dasharray="4 4">
                            <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="2s" repeatCount="indefinite"/>
                        </path>
                        <circle cx="8" cy="12" r="1.5" fill="#42a5f5"/>
                        <circle cx="12" cy="15" r="1.5" fill="#42a5f5"/>
                        <circle cx="17" cy="8" r="1.5" fill="#42a5f5"/>
                    </svg>
                </span>
                <span id="siteNameDisplay">财经新闻聚合</span>
            </h1>
            <div class="stats">
                <span class="stat-badge">
                    共 <span id="totalCount" style="font-weight:700;">0</span> 条新闻
                </span>
                <span class="stat-badge">
                    今日 <span id="todayCount" style="font-weight:700;">0</span> 条
                </span>
                <a href="/admin" class="nav-link">⚙️ 管理</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索新闻标题、内容、标签..." />
            <button onclick="searchNews()">🔍 搜索</button>
            <button class="secondary" onclick="resetSearch()">↺ 重置</button>
            <button class="summary" onclick="window.location.href='/summary'">🤖 总结中心</button>
        </div>

        <div id="siteNotice" class="site-notice" style="display:none;"></div>

        <div class="filter-section">
            <h3>🏷️ 标签筛选</h3>
            <div class="tag-filter" id="tagFilter"></div>
        </div>

        <div id="newsList" class="news-list"></div>
        <div id="pagination" class="pagination"></div>
    </div>

    <script src="/static/js/app.js?v=20260624b"></script>
</body>
</html>
