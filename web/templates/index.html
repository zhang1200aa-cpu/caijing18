<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 财经新闻聚合</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <h1>📈 财经新闻聚合</h1>
            <div class="stats">
                共 <span id="totalCount">0</span> 条新闻 |
                今日 <span id="todayCount">0</span> 条 |
                <a href="/admin" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px;">⚙️ 管理</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索新闻标题、内容、标签..." />
            <button onclick="searchNews()">🔍 搜索</button>
            <button class="secondary" onclick="resetSearch()">↺ 重置</button>
            <button class="summary" onclick="openSummaryModal()">🤖 AI 总结</button>
        </div>

        <!-- ====== AI 总结区域 ====== -->
        <div class="ai-summary-section">
            <div class="ai-summary-header">
                <h2>🤖 AI 财经分析</h2>
                <div class="ai-actions">
                    <button class="ai-refresh-btn" onclick="refreshAllSummaries()">🔄 全部刷新</button>
                </div>
            </div>
            <div class="ai-summary-grid" id="aiSummaryGrid">
                <div class="ai-summary-card" data-range="today">
                    <div class="ai-summary-card-header">
                        <span>📅 当日总结</span>
                        <span class="ai-summary-time" id="time-today">-</span>
                    </div>
                    <div class="ai-summary-card-body" id="body-today">
                        <div class="ai-summary-empty">⏳ 加载中...</div>
                    </div>
                    <div class="ai-summary-card-footer">
                        <span id="meta-today"></span>
                        <button class="ai-refresh-btn" onclick="refreshSummary('today')">🔄 刷新</button>
                    </div>
                </div>
                <div class="ai-summary-card" data-range="yesterday">
                    <div class="ai-summary-card-header">
                        <span>📅 昨日总结</span>
                        <span class="ai-summary-time" id="time-yesterday">-</span>
                    </div>
                    <div class="ai-summary-card-body" id="body-yesterday">
                        <div class="ai-summary-empty">⏳ 加载中...</div>
                    </div>
                    <div class="ai-summary-card-footer">
                        <span id="meta-yesterday"></span>
                        <button class="ai-refresh-btn" onclick="refreshSummary('yesterday')">🔄 刷新</button>
                    </div>
                </div>
                <div class="ai-summary-card" data-range="3d">
                    <div class="ai-summary-card-header">
                        <span>📅 三日总结</span>
                        <span class="ai-summary-time" id="time-3d">-</span>
                    </div>
                    <div class="ai-summary-card-body" id="body-3d">
                        <div class="ai-summary-empty">⏳ 加载中...</div>
                    </div>
                    <div class="ai-summary-card-footer">
                        <span id="meta-3d"></span>
                        <button class="ai-refresh-btn" onclick="refreshSummary('3d')">🔄 刷新</button>
                    </div>
                </div>
                <div class="ai-summary-card" data-range="1w">
                    <div class="ai-summary-card-header">
                        <span>📅 一周总结</span>
                        <span class="ai-summary-time" id="time-1w">-</span>
                    </div>
                    <div class="ai-summary-card-body" id="body-1w">
                        <div class="ai-summary-empty">⏳ 加载中...</div>
                    </div>
                    <div class="ai-summary-card-footer">
                        <span id="meta-1w"></span>
                        <button class="ai-refresh-btn" onclick="refreshSummary('1w')">🔄 刷新</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 搜索结果总结弹窗 -->
        <div class="modal" id="searchSummaryModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>🔎 AI 搜索结果总结</h3>
                    <span class="modal-close" onclick="closeSearchSummaryModal()">&times;</span>
                </div>
                <div class="modal-body">
                    <div class="search-summary-input">
                        <input type="text" id="searchSummaryKeyword" placeholder="输入搜索关键词...">
                        <button onclick="generateSearchSummary()">🤖 AI 总结</button>
                    </div>
                    <div id="searchSummaryResult"></div>
                </div>
            </div>
        </div>

        <div class="filter-section">
            <h3>🏷️ 标签筛选</h3>
            <div class="tag-filter" id="tagFilter"></div>
        </div>

        <div id="newsList" class="news-list"></div>
        <div id="pagination" class="pagination"></div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
