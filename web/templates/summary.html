<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">AI 财经总结</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* 总结页 Tab 切换样式 */
        .summary-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border, #e0e0e0);
            flex-wrap: wrap;
        }
        .summary-tab {
            padding: 10px 24px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            position: relative;
            transition: color 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .summary-tab:hover {
            color: var(--primary, #1a73e8);
        }
        .summary-tab.active {
            color: var(--primary, #1a73e8);
            border-bottom-color: var(--primary, #1a73e8);
        }
        .summary-tab .badge {
            font-size: 11px;
            background: var(--primary, #1a73e8);
            color: #fff;
            border-radius: 10px;
            padding: 1px 8px;
            margin-left: 6px;
        }
        .summary-panel {
            display: none;
        }
        .summary-panel.active {
            display: block;
        }
        .summary-panel .summary-panel-body {
            background: var(--card-bg, #fff);
            border: 1px solid var(--border, #e0e0e0);
            border-radius: 8px;
            padding: 24px;
            line-height: 1.8;
            font-size: 15px;
            overflow-y: visible;
        }
        .summary-panel .summary-panel-body h3 {
            margin-top: 16px;
            margin-bottom: 8px;
            font-size: 17px;
        }
        .summary-panel .summary-panel-body ul, .summary-panel .summary-panel-body ol {
            padding-left: 16px;
            margin: 4px 0;
        }
        .summary-panel .summary-panel-body li {
            margin-bottom: 4px;
        }
        .summary-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .summary-panel-header h3 {
            margin: 0;
            font-size: 18px;
        }
        .summary-panel-header .time-label {
            font-size: 13px;
            color: #999;
            font-weight: normal;
        }
        .summary-panel-meta {
            margin-top: 10px;
            font-size: 13px;
            color: #999;
        }
        .search-summary-input {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .search-summary-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border, #e0e0e0);
            border-radius: 6px;
            font-size: 14px;
        }
        .search-summary-input button {
            padding: 8px 20px;
            background: var(--primary, #1a73e8);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .search-summary-input button:hover {
            opacity: 0.9;
        }
        .summary-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .summary-toolbar h2 {
            margin: 0 0 4px 0;
        }
        .summary-toolbar p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }
        .ai-summary-empty {
            color: #999;
            text-align: center;
            padding: 40px 0;
        }
        .ai-summary-loading {
            color: var(--primary, #1a73e8);
            text-align: center;
            padding: 40px 0;
        }
        .ai-summary-error {
            color: #d32f2f;
            text-align: center;
            padding: 40px 0;
        }
        @media (max-width: 600px) {
            .summary-tab {
                padding: 8px 14px;
                font-size: 13px;
            }
            .summary-panel .summary-panel-body {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <h1>🤖 <span id="siteNameDisplaySummary">AI 财经总结</span></h1>
            <div class="stats">
                <a href="/" class="nav-link">← 返回主页</a>
                <a href="/admin" class="nav-link" style="margin-left:10px;">⚙️ 管理</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="summary-toolbar">
            <div>
                <h2>总结中心</h2>
                <p>点击标签切换查看不同时间范围的 AI 总结。三天和一周总结会优先基于每日总结再汇总。</p>
            </div>
            <button class="btn btn-success" onclick="refreshAllSummaries()">🔄 全部刷新</button>
        </div>

        <!-- Tab 标签栏 -->
        <div class="summary-tabs" id="summaryTabs">
            <button class="summary-tab active" data-range="today" onclick="switchSummaryTab('today')">今日</button>
            <button class="summary-tab" data-range="yesterday" onclick="switchSummaryTab('yesterday')">昨日</button>
            <button class="summary-tab" data-range="3d" onclick="switchSummaryTab('3d')">三天</button>
            <button class="summary-tab" data-range="1w" onclick="switchSummaryTab('1w')">一周</button>
            <button class="summary-tab" data-range="todayqa" onclick="switchSummaryTab('todayqa')">当日财经分析</button>
            <button class="summary-tab" data-range="history" onclick="switchSummaryTab('history')">📅 历史总结</button>
        </div>

        <!-- 今日总结 -->
        <section class="summary-panel active" id="panel-today" data-range="today">
            <div class="summary-panel-header">
                <div>
                    <h3>今日总结</h3>
                    <span class="time-label" id="time-today">-</span>
                </div>
                <button class="btn btn-sm" onclick="refreshSummary('today')">刷新</button>
            </div>
            <div class="summary-panel-body" id="body-today"><div class="ai-summary-empty">加载中...</div></div>
            <div class="summary-panel-meta" id="meta-today"></div>
        </section>

        <!-- 昨日总结 -->
        <section class="summary-panel" id="panel-yesterday" data-range="yesterday">
            <div class="summary-panel-header">
                <div>
                    <h3>昨日总结</h3>
                    <span class="time-label" id="time-yesterday">-</span>
                </div>
                <button class="btn btn-sm" onclick="refreshSummary('yesterday')">刷新</button>
            </div>
            <div class="summary-panel-body" id="body-yesterday"><div class="ai-summary-empty">加载中...</div></div>
            <div class="summary-panel-meta" id="meta-yesterday"></div>
        </section>

        <!-- 三天总结 -->
        <section class="summary-panel" id="panel-3d" data-range="3d">
            <div class="summary-panel-header">
                <div>
                    <h3>三天总结</h3>
                    <span class="time-label" id="time-3d">-</span>
                </div>
                <button class="btn btn-sm" onclick="refreshSummary('3d')">刷新</button>
            </div>
            <div class="summary-panel-body" id="body-3d"><div class="ai-summary-empty">加载中...</div></div>
            <div class="summary-panel-meta" id="meta-3d"></div>
        </section>

        <!-- 一周总结 -->
        <section class="summary-panel" id="panel-1w" data-range="1w">
            <div class="summary-panel-header">
                <div>
                    <h3>一周总结</h3>
                    <span class="time-label" id="time-1w">-</span>
                </div>
                <button class="btn btn-sm" onclick="refreshSummary('1w')">刷新</button>
            </div>
            <div class="summary-panel-body" id="body-1w"><div class="ai-summary-empty">加载中...</div></div>
            <div class="summary-panel-meta" id="meta-1w"></div>
        </section>

        <!-- 当日财经分析 -->
        <section class="summary-panel" id="panel-todayqa" data-range="todayqa">
            <div class="summary-panel-header">
                <div>
                    <h3>当日财经分析</h3>
                    <span class="time-label" id="todayQATimeLabel">基于所有新闻，AI 智能回答你的问题</span>
                </div>
            </div>
            <div class="search-summary-input">
                <input type="text" id="todayQAInput" placeholder="输入你的问题，例如：今天A股市场走势如何？有哪些热点板块？" onkeyup="if(event.key==='Enter')generateTodayQA()">
                <button id="todayQABtn" onclick="generateTodayQA()">🤖 提问</button>
            </div>
            <div id="todayQAStatusBar" style="display:none;padding:8px 12px;margin-bottom:10px;border-radius:6px;font-size:13px;"></div>
            <div class="summary-panel-body" id="todayQAResult">
                <div class="ai-summary-empty" id="todayQAEmptyHint">输入你关心的财经问题，AI 将基于新闻为你分析解答</div>
            </div>
        </section>

        <!-- 历史总结 -->
        <section class="summary-panel" id="panel-history" data-range="history">
            <div class="summary-panel-header">
                <div>
                    <h3>📅 按日期查看历史总结</h3>
                    <span class="time-label">查看任意日期的 AI 财经总结</span>
                </div>
            </div>
            <div class="search-summary-input">
                <input type="date" id="historyDateInput">
                <button onclick="loadHistorySummary()">📄 查看</button>
                <button class="btn btn-sm" style="margin-left:4px;" onclick="loadHistoryDateList()">🔄 刷新日期列表</button>
            </div>
            <div id="historyDateList" style="margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;"></div>
            <div class="summary-panel-body" id="body-history">
                <div class="ai-summary-empty">选择日期后点击"查看"按钮，浏览该日的 AI 总结</div>
            </div>
            <div class="summary-panel-meta" id="meta-history"></div>
        </section>
    </div>

    <script>
        // ======== Tab 切换 ========
        let currentSummaryTab = 'today';

        function switchSummaryTab(range) {
            currentSummaryTab = range;
            // 切换 Tab 高亮
            document.querySelectorAll('.summary-tab').forEach(function(tab) {
                tab.classList.toggle('active', tab.dataset.range === range);
            });
            // 切换内容面板
            document.querySelectorAll('.summary-panel').forEach(function(panel) {
                panel.classList.toggle('active', panel.dataset.range === range);
            });
        }

        // ======== Markdown 内容渲染 ========
        function renderSummaryContent(text) {
            // 转义 HTML
            text = text.replace(/</g, '<').replace(/>/g, '>');
            // 处理加粗
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // 处理标题
            text = text.replace(/^#### (.*?)$/gm, '<h4>$1</h4>');
            text = text.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
            
            const lines = text.split('\n');
            let html = '';
            let inList = false;
            let listLevel = 0;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                // 跳过已处理的标题行和空行
                if (/^<h[34]>/.test(line)) {
                    if (inList) { html += '</ul>'.repeat(listLevel); inList = false; listLevel = 0; }
                    html += line;
                    continue;
                }
                if (line.trim() === '') {
                    if (inList) { html += '</ul>'.repeat(listLevel); inList = false; listLevel = 0; }
                    continue;
                }
                // 检测列表项（- 或 * 开头）
                const listMatch = line.match(/^(\s*)[-*]\s+(.*)/);
                if (listMatch) {
                    const indent = listMatch[1].length;
                    const content = listMatch[2];
                    const level = Math.min(Math.floor(indent / 2) + 1, 2);
                    
                    if (!inList) {
                        html += '<ul>';
                        inList = true;
                        listLevel = 1;
                    }
                    
                    if (level > listLevel) {
                        html += '<ul>';
                        listLevel = level;
                    } else if (level < listLevel) {
                        html += '</ul>';
                        listLevel = level;
                    }
                    
                    html += '<li>' + content + '</li>';
                } else {
                    if (inList) { html += '</ul>'.repeat(listLevel); inList = false; listLevel = 0; }
                    html += line + '<br>';
                }
            }
            if (inList) {
                html += '</ul>'.repeat(listLevel);
            }
            return html;
        }

        // 保存当前设置的小时数
        let currentQAHours = 24;

        function formatQAHoursStr(hours) {
            if (hours <= 1) return '1小时';
            if (hours < 24) return hours + '小时';
            if (hours === 24) return '24小时';
            if (hours < 720) return (hours / 24).toFixed(0) + '天';
            return '30天';
        }

        // ======== 加载当日财经分析时间范围设置 ========
        async function loadTodayQAHours() {
            const timeLabel = document.getElementById('todayQATimeLabel');
            const emptyHint = document.getElementById('todayQAEmptyHint');
            if (!timeLabel) return;
            try {
                const res = await fetch('/api/settings/today-qa-hours');
                const data = await res.json();
                if (data.success && data.data) {
                    let hours = parseInt(data.data.today_qa_hours) || 24;
                    currentQAHours = hours;
                    const hoursStr = formatQAHoursStr(hours);
                    timeLabel.textContent = '基于近 ' + hoursStr + ' 新闻，AI 智能回答你的问题';
                    if (emptyHint) {
                        emptyHint.textContent = '输入你关心的财经问题，AI 将基于近 ' + hoursStr + ' 新闻为你分析解答';
                    }
                }
            } catch (e) {
                console.error('loadTodayQAHours:', e);
            }
        }

        async function loadAllSummaries() {
            await loadTodayQAHours();
            const summaries = ['today', 'yesterday', '3d', '1w'];
            for (const range of summaries) {
                loadSingleSummary(range);
            }
        }

        async function loadSingleSummary(range) {
            const bodyEl = document.getElementById('body-' + range);
            const metaEl = document.getElementById('meta-' + range);
            const timeEl = document.getElementById('time-' + range);
            if (!bodyEl) return;
            
            try {
                const endpointMap = {
                    'today': '/api/summary/today',
                    'yesterday': '/api/summary/yesterday',
                    '3d': '/api/summary/3d',
                    '1w': '/api/summary/1w'
                };
                const url = endpointMap[range];
                if (!url) return;
                
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.success && data.data) {
                    const summary = data.data;
                    if (summary.generated_at && timeEl) {
                        timeEl.textContent = summary.generated_at;
                    }
                    let html = renderSummaryContent(summary.content);
                    bodyEl.innerHTML = html;
                    if (metaEl) {
                        metaEl.textContent = '📰 ' + (summary.news_count || '?') + ' 条新闻';
                    }
                } else {
                    bodyEl.innerHTML = '<div class="ai-summary-empty">暂无总结，点击刷新生成</div>';
                }
            } catch (e) {
                console.error('loadSummary ' + range + ':', e);
                bodyEl.innerHTML = '<div class="ai-summary-error">❌ 加载失败</div>';
            }
        }

        async function refreshSummary(range) {
            const endpointMap = {
                'today': '/api/summary/today',
                'yesterday': '/api/summary/yesterday',
                '3d': '/api/summary/3d',
                '1w': '/api/summary/1w'
            };
            const url = endpointMap[range];
            if (!url) return;
            
            const bodyEl = document.getElementById('body-' + range);
            if (!bodyEl) return;
            bodyEl.innerHTML = '<div class="ai-summary-loading">⏳ 生成中...</div>';
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ force: true })
                });
                const data = await res.json();
                if (data.success && data.data) {
                    loadSingleSummary(range);
                } else {
                    bodyEl.innerHTML = '<div class="ai-summary-error">❌ ' + (data.message || '生成失败') + '</div>';
                }
            } catch (e) {
                console.error('refreshSummary ' + range + ':', e);
                bodyEl.innerHTML = '<div class="ai-summary-error">❌ 网络错误</div>';
            }
        }

        async function refreshAllSummaries() {
            const ranges = ['today', 'yesterday', '3d', '1w'];
            for (const range of ranges) {
                const bodyEl = document.getElementById('body-' + range);
                if (bodyEl) bodyEl.innerHTML = '<div class="ai-summary-loading">⏳ 生成中...</div>';
                const endpointMap = {
                    'today': '/api/summary/today',
                    'yesterday': '/api/summary/yesterday',
                    '3d': '/api/summary/3d',
                    '1w': '/api/summary/1w'
                };
                const url = endpointMap[range];
                if (!url) continue;
                try {
                    await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ force: true })
                    });
                } catch (e) {
                    console.error('refreshAll ' + range + ':', e);
                }
            }
            setTimeout(loadAllSummaries, 1000);
        }

        async function generateTodayQA() {
            const input = document.getElementById('todayQAInput');
            const btn = document.getElementById('todayQABtn');
            const statusBar = document.getElementById('todayQAStatusBar');
            const resultDiv = document.getElementById('todayQAResult');
            
            const question = input.value.trim();
            if (!question) {
                resultDiv.innerHTML = '<div class="ai-summary-error">❌ 请输入你的问题</div>';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ 分析中...';
            btn.style.opacity = '0.7';
            
            statusBar.style.display = 'block';
            statusBar.innerHTML = '⏳ 正在提交问题...';
            statusBar.style.background = '#e6f7ff';
            statusBar.style.border = '1px solid #91d5ff';
            statusBar.style.color = '#003a8c';
            
            const hoursStr = formatQAHoursStr(currentQAHours);
            resultDiv.innerHTML = '<div class="ai-summary-loading">⏳ AI 正在基于近 ' + hoursStr + ' 新闻分析，请稍候...</div>';
            
            try {
                statusBar.innerHTML = '📡 正在请求 AI 分析...';
                const res = await fetch('/api/summary/today-qa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                
                statusBar.innerHTML = '📝 AI 响应已返回，正在生成结果...';
                const data = await res.json();
                
                if (data.success && data.data) {
                    let html = renderSummaryContent(data.data.content);
                    resultDiv.innerHTML = html;
                    const qaHoursStr = formatQAHoursStr(currentQAHours);
                    statusBar.innerHTML = '✅ 分析完成！共参考 ' + (data.data.news_count || '近' + qaHoursStr) + ' 条新闻';
                    statusBar.style.background = '#f6ffed';
                    statusBar.style.border = '1px solid #b7eb8f';
                    statusBar.style.color = '#135200';
                    setTimeout(function() {
                        statusBar.style.display = 'none';
                    }, 4000);
                } else {
                    resultDiv.innerHTML = '<div class="ai-summary-error">❌ ' + (data.message || '生成失败') + '</div>';
                    statusBar.innerHTML = '❌ 分析失败：' + (data.message || '请稍后重试');
                    statusBar.style.background = '#fff2f0';
                    statusBar.style.border = '1px solid #ffccc7';
                    statusBar.style.color = '#820014';
                }
            } catch (e) {
                console.error('generateTodayQA:', e);
                resultDiv.innerHTML = '<div class="ai-summary-error">❌ 网络错误</div>';
                statusBar.innerHTML = '❌ 网络请求失败，请检查网络连接后重试';
                statusBar.style.background = '#fff2f0';
                statusBar.style.border = '1px solid #ffccc7';
                statusBar.style.color = '#820014';
            } finally {
                btn.disabled = false;
                btn.textContent = '🤖 提问';
                btn.style.opacity = '1';
            }
        }

        // ======== 历史总结功能 ========
        async function loadHistoryDateList() {
            const container = document.getElementById('historyDateList');
            if (!container) return;
            container.innerHTML = '<span style="color:#999;font-size:13px;">加载日期列表...</span>';
            try {
                const res = await fetch('/api/summary/dates');
                const data = await res.json();
                if (data.success && data.data && data.data.length > 0) {
                    const dates = [...new Set(data.data)].sort().reverse();
                    container.innerHTML = '';
                    dates.slice(0, 50).forEach(function(date) {
                        const btn = document.createElement('button');
                        btn.className = 'btn btn-sm';
                        btn.style.margin = '2px';
                        btn.textContent = date;
                        btn.onclick = function() {
                            document.getElementById('historyDateInput').value = date;
                            loadHistorySummary();
                        };
                        container.appendChild(btn);
                    });
                    if (dates.length > 50) {
                        const more = document.createElement('span');
                        more.style.cssText = 'font-size:12px;color:#999;margin-left:4px;';
                        more.textContent = '... 共' + dates.length + '天';
                        container.appendChild(more);
                    }
                } else {
                    container.innerHTML = '<span style="color:#999;font-size:13px;">暂无历史总结数据</span>';
                }
            } catch (e) {
                console.error('loadHistoryDateList:', e);
                container.innerHTML = '<span style="color:#d32f2f;font-size:13px;">加载失败</span>';
            }
        }

        async function loadHistorySummary() {
            const input = document.getElementById('historyDateInput');
            const bodyEl = document.getElementById('body-history');
            const metaEl = document.getElementById('meta-history');
            const dateStr = input.value;
            if (!dateStr) {
                bodyEl.innerHTML = '<div class="ai-summary-error">❌ 请先选择日期</div>';
                return;
            }
            bodyEl.innerHTML = '<div class="ai-summary-loading">⏳ 加载中...</div>';
            if (metaEl) metaEl.textContent = '';
            try {
                const res = await fetch('/api/summary/date/' + dateStr);
                const data = await res.json();
                if (data.success && data.data) {
                    const summary = data.data;
                    let html = renderSummaryContent(summary.content);
                    bodyEl.innerHTML = html;
                    if (metaEl) {
                        var meta = '📰 ' + (summary.news_count || '?') + ' 条新闻';
                        if (summary.generated_at) meta += ' · 生成于 ' + summary.generated_at;
                        if (summary.is_composite) meta += ' · 📦 合成总结';
                        metaEl.textContent = meta;
                    }
                } else {
                    bodyEl.innerHTML = '<div class="ai-summary-empty">❌ ' + (data.message || '该日期暂无总结') + '</div>';
                }
            } catch (e) {
                console.error('loadHistorySummary:', e);
                bodyEl.innerHTML = '<div class="ai-summary-error">❌ 网络错误</div>';
            }
        }

        // ======== 加载网站名称 ========
        async function loadSummarySiteName() {
            const displayEl = document.getElementById('siteNameDisplaySummary');
            const titleEl = document.getElementById('pageTitle');
            try {
                const res = await fetch('/api/admin/site-name');
                const data = await res.json();
                if (data.success && data.data.site_name) {
                    var name = data.data.site_name;
                    if (displayEl) displayEl.textContent = name + ' - 总结中心';
                    if (titleEl) titleEl.textContent = 'AI 财经总结 - ' + name;
                }
            } catch (e) {
                console.error('loadSummarySiteName:', e);
            }
        }

        // ======== 启动加载 ========
        document.addEventListener('DOMContentLoaded', function() {
            if (document.getElementById('siteNameDisplaySummary')) {
                loadSummarySiteName();
            }
            if (document.getElementById('panel-today')) {
                loadAllSummaries();
            }
            if (document.getElementById('historyDateList')) {
                loadHistoryDateList();
            }
        });
    </script>
</body>
</html>
