<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 财经总结 - caijing18</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; display: flex; align-items: center; gap: 8px; }
        .header .ai-badge { background: #27ae60; color: white; padding: 3px 10px; border-radius: 12px; font-size: 11px; }
        .header .nav-link { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px; }
        .header .nav-link:hover { color: white; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .summary-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; }
        .summary-card .card-header { padding: 20px 24px; border-bottom: 1px solid #f0f2f5; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .summary-card .card-header .title { font-size: 18px; font-weight: 600; color: #1a1a2e; }
        .summary-card .card-header .meta { font-size: 12px; color: #999; }
        .summary-card .card-body { padding: 24px; min-height: 200px; }
        .summary-content { font-size: 14px; line-height: 1.8; color: #333; }
        .summary-content h3 { margin: 20px 0 10px; color: #1a1a2e; font-size: 16px; }
        .summary-content h4 { margin: 14px 0 8px; color: #2c3e50; font-size: 15px; }
        .summary-content ul, .summary-content ol { margin-left: 20px; }
        .summary-content li { margin: 4px 0; }
        .summary-content strong { color: #27ae60; }
        .summary-content p { margin: 8px 0; }
        .loading { text-align: center; padding: 60px 20px; color: #999; }
        .loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: #0f3460; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { color: #999; margin-bottom: 16px; }
        .btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn-primary { background: #0f3460; color: white; }
        .btn-primary:hover { background: #1a5276; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #2ecc71; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-state { text-align: center; padding: 60px 20px; color: #e74c3c; }
        .range-tabs { display: flex; gap: 6px; }
        .range-tab { padding: 6px 16px; background: #f0f2f5; border-radius: 6px; cursor: pointer; font-size: 13px; border: none; color: #666; }
        .range-tab.active { background: #0f3460; color: white; }
        .range-tab:hover:not(.active) { background: #e0e2e5; }
        .footer-actions { display: flex; gap: 8px; align-items: center; }
        @media (max-width: 600px) {
            .header { flex-direction: column; gap: 10px; }
            .summary-card .card-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            🤖 AI 财经总结
            <span class="ai-badge">AI 生成</span>
        </h1>
        <div style="display:flex;gap:10px;align-items:center;">
            <a href="/" class="nav-link">← 返回主页</a>
        </div>
    </div>

    <div class="container">
        <div class="summary-card">
            <div class="card-header">
                <div>
                    <div class="title" id="summaryTitle">📊 财经总结</div>
                    <div class="meta" id="summaryMeta"></div>
                </div>
                <div class="footer-actions">
                    <div class="range-tabs" id="rangeTabs">
                        <button class="range-tab" data-range="1" onclick="switchRange(1)">📅 每日</button>
                        <button class="range-tab" data-range="3" onclick="switchRange(3)">📅 三日</button>
                        <button class="range-tab" data-range="7" onclick="switchRange(7)">📅 一周</button>
                    </div>
                    <button class="btn btn-success" onclick="refreshSummary()" id="refreshBtn">🔄 刷新</button>
                </div>
            </div>
            <div class="card-body" id="summaryBody">
                {% if summary %}
                <div class="summary-content">
                    {% set html = summary.content|replace('### ', '<h3>')|replace('#### ', '<h4>')|replace('- ', '<li>') %}
                    {{ html|safe }}
                </div>
                {% elif error %}
                <div class="error-state">❌ {{ error }}</div>
                {% else %}
                <div class="loading">
                    <div class="spinner"></div>
                    <div>⏳ 加载 AI 总结中...</div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>

    <script>
        // URL 格式支持:
        //   /summary/20260616/1  - 完整新格式（日期+范围）
        //   /summary/20260616    - 仅日期，默认1天
        //   /summary/1           - 当天，1天
        //   /summary/3           - 当天，三天
        //   /summary/7           - 当天，一周
        //   /summary             - 当天，默认1天
        const pathParts = window.location.pathname.split('/').filter(Boolean);

        let currentDate = '';
        let currentRange = '1';

        function isDate(str) {
            return /^\d{8}$/.test(str);
        }

        function getTodayDateStr() {
            const now = new Date();
            return now.getFullYear().toString() +
                String(now.getMonth() + 1).padStart(2, '0') +
                String(now.getDate()).padStart(2, '0');
        }

        // 解析 URL
        if (pathParts[0] === 'summary') {
            if (pathParts.length >= 3 && isDate(pathParts[1])) {
                // 新格式: /summary/20260616/1
                currentDate = pathParts[1];
                currentRange = pathParts[2];
            } else if (pathParts.length === 2) {
                const part = pathParts[1];
                if (isDate(part)) {
                    // 新格式: /summary/20260616
                    currentDate = part;
                    currentRange = '1';
                } else {
                    // 旧格式或简化: /summary/1d, /summary/1, /summary/3d, /summary/3, /summary/7
                    const m = part.match(/(\d+)/);
                    if (m) {
                        const r = m[1];
                        if (r === '1') currentRange = '1';
                        else if (r === '3') currentRange = '3';
                        else if (r === '7') currentRange = '7';
                    }
                    currentDate = getTodayDateStr();
                }
            } else {
                // /summary 无参数
                currentDate = getTodayDateStr();
                currentRange = '1';
            }
        }

        if (currentDate && /^\d{8}$/.test(currentDate)) {
            // 验证日期合理性（不早于2000年）
            const y = parseInt(currentDate.substring(0, 4));
            if (y < 2000 || y > 2100) {
                currentDate = getTodayDateStr();
            }
        } else {
            currentDate = getTodayDateStr();
        }

        if (!['1', '3', '7'].includes(currentRange)) {
            currentRange = '1';
        }

        const rangeMap = { '1': '每日', '3': '三日', '7': '一周' };
        const rangeToApi = { '1': '1d', '3': '3d', '7': '1w' };

        // 格式化日期显示
        function formatDateLabel(dateStr) {
            if (!dateStr || !/^\d{8}$/.test(dateStr)) return '未知日期';
            return `${dateStr.substring(0,4)}-${dateStr.substring(4,6)}-${dateStr.substring(6,8)}`;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 高亮当前 range tab
            document.querySelectorAll('.range-tab').forEach(tab => {
                if (tab.dataset.range === currentRange) {
                    tab.classList.add('active');
                }
            });

            const title = document.getElementById('summaryTitle');
            const dateStr = formatDateLabel(currentDate);
            title.textContent = `📊 ${dateStr} ${rangeMap[currentRange] || '每日'}财经总结`;

            // 如果服务端没有初始化数据，发起 AJAX 加载
            const bodyEl = document.getElementById('summaryBody');
            const hasContent = bodyEl.querySelector('.summary-content') || bodyEl.querySelector('.error-state');
            if (!hasContent) {
                loadSummary();
            } else if (bodyEl.querySelector('.summary-content')) {
                // 有服务端渲染的内容，更新 meta
                updateMeta();
            }
        });

        function updateMeta() {
            const meta = document.getElementById('summaryMeta');
            // 从服务端渲染的 data 属性获取
            const contentDiv = document.querySelector('.summary-content');
            if (contentDiv && contentDiv.dataset) {
                const count = contentDiv.dataset.newsCount;
                const time = contentDiv.dataset.generatedAt;
                if (count || time) {
                    meta.textContent = `基于 ${count || '?'} 条新闻生成${time ? ' | ' + new Date(time).toLocaleString('zh-CN') : ''}`;
                }
            }
        }

        async function loadSummary() {
            const body = document.getElementById('summaryBody');
            const meta = document.getElementById('summaryMeta');
            const title = document.getElementById('summaryTitle');

            const dateStr = formatDateLabel(currentDate);
            title.textContent = `📊 ${dateStr} ${rangeMap[currentRange] || '每日'}财经总结`;
            body.innerHTML = `<div class="loading"><div class="spinner"></div><div>⏳ 加载 AI 总结中...</div></div>`;

            try {
                // 统一使用 /api/summary GET
                const apiDate = `${currentDate.substring(0,4)}-${currentDate.substring(4,6)}-${currentDate.substring(6,8)}`;
                const url = `/api/summary?range=${rangeToApi[currentRange]}&date=${apiDate}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.success && data.data && data.data.content) {
                    let html = data.data.content
                        .replace(/### /g, '<h3>')
                        .replace(/#### /g, '<h4>')
                        .replace(/- /g, '<li>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');

                    html = html.replace(/<li>/g, '<ul><li>');
                    html = html.replace(/<\/li>/g, '</li></ul>');
                    html = html.replace(/<\/ul><ul>/g, '');

                    const dateStr2 = data.data.generated_at ? new Date(data.data.generated_at).toLocaleString('zh-CN') : '未知';
                    meta.textContent = `基于 ${data.data.news_count} 条新闻生成 | ${dateStr2}`;
                    body.innerHTML = `<div class="summary-content">${html}</div>`;
                } else if (res.status === 404) {
                    meta.textContent = '';
                    body.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>${rangeMap[currentRange]}总结尚未生成</p>
                            <button class="btn btn-success" onclick="refreshSummary()">🔄 点击生成</button>
                        </div>
                    `;
                } else {
                    meta.textContent = '';
                    body.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>暂无此日期的${rangeMap[currentRange]}总结</p>
                            <button class="btn btn-success" onclick="refreshSummary()">🔄 点击生成</button>
                        </div>
                    `;
                }
            } catch (e) {
                body.innerHTML = `<div class="error-state">❌ 加载失败: ${e.message}</div>`;
            }
        }

        async function refreshSummary() {
            const btn = document.getElementById('refreshBtn');
            const body = document.getElementById('summaryBody');
            const meta = document.getElementById('summaryMeta');
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';
            meta.textContent = '';
            body.innerHTML = `<div class="loading"><div class="spinner"></div><div>⏳ AI 正在分析 ${rangeMap[currentRange]}新闻，请稍候...</div></div>`;

            try {
                const apiDate = `${currentDate.substring(0,4)}-${currentDate.substring(4,6)}-${currentDate.substring(6,8)}`;
                const res = await fetch('/api/summary', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ range: rangeToApi[currentRange], date: apiDate })
                });
                const data = await res.json();
                if (data.success) {
                    await loadSummary();
                } else {
                    body.innerHTML = `<div class="error-state">❌ 生成失败: ${data.error || '请稍后重试'}</div>`;
                }
            } catch (e) {
                body.innerHTML = `<div class="error-state">❌ 网络错误: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 刷新';
            }
        }

        function switchRange(range) {
            currentRange = range.toString();
            document.querySelectorAll('.range-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.range === currentRange);
            });
            // 更新 URL 为新格式
            window.history.replaceState(null, '', `/summary/${currentDate}/${currentRange}`);
            const title = document.getElementById('summaryTitle');
            const dateStr = formatDateLabel(currentDate);
            title.textContent = `📊 ${dateStr} ${rangeMap[currentRange] || '每日'}财经总结`;
            loadSummary();
        }
    </script>
</body>
</html>
