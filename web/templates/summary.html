<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 财经总结 - caijing18</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="header">
        <h1>
            🤖 AI 财经总结
            <span class="ai-badge">AI 生成</span>
        </h1>
        <div style="display:flex;gap:10px;align-items:center;">
            <a href="/" class="nav-link">← 返回主页</a>
        </div>
    </div>

    <div class="container">
        <div class="summary-card">
            <div class="card-header">
                <div>
                    <div class="title" id="summaryTitle">📊 财经总结</div>
                    <div class="meta" id="summaryMeta"></div>
                </div>
                <div class="footer-actions">
                    <div class="range-tabs" id="rangeTabs">
                        <button class="range-tab" data-range="1" onclick="switchRange(1)">📅 每日</button>
                        <button class="range-tab" data-range="3" onclick="switchRange(3)">📅 三日</button>
                        <button class="range-tab" data-range="7" onclick="switchRange(7)">📅 一周</button>
                    </div>
                    <button class="btn btn-success" onclick="refreshSummary()" id="refreshBtn">🔄 刷新</button>
                </div>
            </div>
            <div class="card-body" id="summaryBody">
                {% if summary %}
                <div class="summary-content">
                    {% set html = summary.content|replace('### ', '<h3>')|replace('#### ', '<h4>')|replace('- ', '<li>') %}
                    {{ html|safe }}
                </div>
                {% elif error %}
                <div class="error-state">❌ {{ error }}</div>
                {% else %}
                <div class="loading">
                    <div class="spinner"></div>
                    <div>⏳ 加载 AI 总结中...</div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
