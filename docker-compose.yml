version: '3.8'

services:
  app:
    build: .
    container_name: caijing18_app
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_PATH=/app/data/finance_data.db
    # 其他配置...

  telegram_bot:
    build: .
    container_name: caijing18_bot
    command: python telegram_bot.py
    volumes:
      - ./data:/app/data
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    restart: always
    depends_on:
      - app
