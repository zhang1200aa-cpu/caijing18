services:
  app:
    build: .
    container_name: caijing18_app
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - TG_CHANNEL_URLS=${TG_CHANNEL_URLS}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_PATH=${DATABASE_PATH:-data/finance_data.db}
      - APP_DATA_DIR=${APP_DATA_DIR:-data}
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
      - FLASK_HOST=${FLASK_HOST:-0.0.0.0}
      - FLASK_PORT=${FLASK_PORT:-5000}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
    depends_on:
      - telegram_bot
    command: python main.py

  telegram_bot:
    build: .
    container_name: caijing18_bot
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - TG_CHANNEL_URLS=${TG_CHANNEL_URLS}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_PATH=${DATABASE_PATH:-data/finance_data.db}
      - APP_DATA_DIR=${APP_DATA_DIR:-data}
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
      - FLASK_HOST=${FLASK_HOST:-0.0.0.0}
      - FLASK_PORT=${FLASK_PORT:-5000}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
    command: python telegram_bot.py
