services:
  app:
    build: .
    container_name: caijing18_app
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - TG_CHANNEL_URLS=${TG_CHANNEL_URLS}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_PATH=${DATABASE_PATH:-data/finance_data.db}
      - APP_DATA_DIR=${APP_DATA_DIR:-data}
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
      - FLASK_HOST=${FLASK_HOST:-0.0.0.0}
      - FLASK_PORT=${FLASK_PORT:-5000}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-7}
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.75}
      - SCRAPE_INTERVAL_MINUTES=${SCRAPE_INTERVAL_MINUTES:-30}
    # app 和 telegram_bot 独立运行，无依赖关系
    command: python main.py
    restart: unless-stopped

  telegram_bot:
    build: .
    container_name: caijing18_bot
    profiles:
      - bot
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - TG_CHANNEL_URLS=${TG_CHANNEL_URLS}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_PATH=${DATABASE_PATH:-data/finance_data.db}
      - APP_DATA_DIR=${APP_DATA_DIR:-data}
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
      - FLASK_HOST=${FLASK_HOST:-0.0.0.0}
      - FLASK_PORT=${FLASK_PORT:-5000}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-7}
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.75}
      - SCRAPE_INTERVAL_MINUTES=${SCRAPE_INTERVAL_MINUTES:-30}
    command: python telegram_bot.py
    # 如果没有配置 TELEGRAM_BOT_TOKEN，bot 会失败退出不重启
    restart: no
